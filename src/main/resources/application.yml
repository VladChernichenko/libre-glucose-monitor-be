spring:
  application:
    name: glucose-monitor-be
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/glucose_monitor}
    username: ${DB_USERNAME:glucose_monitor_user}
    password: ${DB_PASSWORD:glucose}
    driver-class-name: org.postgresql.Driver
  jackson:
    time-zone: ${TZ:Europe/London}  # Use user's timezone, default to London
    date-format: "yyyy-MM-dd'T'HH:mm:ss"
  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for migrations
    show-sql: false
    open-in-view: false  # Disable to prevent lazy loading issues
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  cloud:
    compatibility-verifier:
      enabled: false

security:
  jwt:
    secret: ${JWT_SECRET:very-strong-secret-change-me-please-make-it-long-and-secure-in-production}
    access-expiration-ms: 3600000      # 1 hour
    refresh-expiration-ms: 86400000    # 24 hours

server:
  port: 8080
  error:
    include-stacktrace: never

logging:
  level:
    root: WARN
    che.glucosemonitorbe.scheduler: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    org.springframework.orm.jpa: OFF

app:
  ai:
    ollama:
      enabled: ${OLLAMA_ENABLED:true}
      url: ${OLLAMA_URL:http://localhost:11434/api/generate}
      model: ${OLLAMA_MODEL:llama3.1:8b}
      num-ctx: ${OLLAMA_NUM_CTX:8192}
  version:
    version: "1.0.0"
    api-version: "v1"
    build-number: ${BUILD_NUMBER:dev-build}
    git-commit: ${GIT_COMMIT:unknown}
    build-time: ${BUILD_TIME:}
    min-frontend-version: "1.0.0"
    compatible-frontend-versions:
      - "1.0.0"
      - "1.0.1" 
      - "1.1.0"
    feature-versions:
      glucose-calculations: "1.0.0"
      insulin-calculator: "1.0.0"
      carbs-on-board: "1.0.0"
  
  features:
    # Enable backend calculations with timezone support
    backend-mode-enabled: true
    insulin-calculator-enabled: true
    carbs-on-board-enabled: true
    glucose-data-enabled: false
    glucose-calculations-enabled: true
    user-configuration-enabled: false
    nutrition-aware-prediction-enabled: ${APP_FEATURES_NUTRITION_AWARE_PREDICTION_ENABLED:true}

    # Migration percentages (0-100) - 100 means all users use backend
    insulin-calculator-migration-percent: 100
    carbs-on-board-migration-percent: 100
    glucose-data-migration-percent: 100
    glucose-calculations-migration-percent: 100

  # Background Nightscout в†’ DB sync (stored chart data), every 5 minutes per user with active config
  glucose-sync:
    enabled: true
    fixed-delay-ms: 300000
    initial-delay-ms: 15000
    entry-count: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Libre Link Up: EU host default (France / EU LibreView accounts). Override with LIBRE_API_BASE_URL.
libre:
  api:
    base-url: ${LIBRE_API_BASE_URL:https://api-eu.libreview.io}

nutrition:
  api-ninjas:
    enabled: ${NUTRITION_API_NINJAS_ENABLED:false}
    base-url: ${NUTRITION_API_NINJAS_BASE_URL:https://api.api-ninjas.com/v1/nutrition}
    api-key: ${NUTRITION_API_NINJAS_API_KEY:}
    timeout-ms: ${NUTRITION_API_NINJAS_TIMEOUT_MS:3000}

# CORS configuration for development
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
