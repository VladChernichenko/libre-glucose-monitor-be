spring:
  application:
    name: glucose-monitor-be
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/glucose_monitor}
    username: ${DB_USERNAME:glucose_monitor_user}
    password: ${DB_PASSWORD:glucose}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jackson:
    time-zone: ${TZ:Europe/London}  # Use user's timezone, default to London
    date-format: "yyyy-MM-dd'T'HH:mm:ss"
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for migrations
    show-sql: false
    open-in-view: false  # Disable to prevent lazy loading issues
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
  cache:
    type: caffeine
    cache-names: nightscoutCredentials,nightscoutEntries,nutritionApiResponses,cgmReadings,llmResponses,cobSettings
    caffeine:
      # Per-cache specs override this default; kept as a safety net.
      spec: maximumSize=50000,expireAfterWrite=5m
  data:
    mongodb:
      # No credentials in committed config. For an auth-enabled Mongo, supply full creds via MONGODB_URI env.
      uri: ${MONGODB_URI:mongodb://localhost:27017/off}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mvc:
    async:
      request-timeout: 120000

security:
  jwt:
    # Dev-only fallback (>=64 bytes for HS512). SecretsStartupValidator refuses to boot under the
    # 'prod' profile with this default — set a strong JWT_SECRET (e.g. `openssl rand -base64 64`).
    secret: ${JWT_SECRET:dev-only-insecure-jwt-secret-CHANGE-ME-do-not-use-in-production-0123456789}
    access-expiration-ms: 3600000      # 1 hour
    # Long-lived refresh so mobile clients stay signed in across weeks without re-login.
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:31536000000}    # default 365 days
  # Per-IP brute-force protection on /api/auth/login and /api/auth/register (counts failed attempts).
  rate-limit:
    auth:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:300}

server:
  port: 8080
  error:
    include-stacktrace: never

logging:
  level:
    root: INFO
    che.glucosemonitorbe.ai: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] [%X{userId}] %logger{36} - %msg%n"

app:
  storage:
    s3:
      # MinIO / S3-compatible object storage for note meal photos. Leave ENDPOINT/BUCKET
      # unset to disable photo upload (NotePhotoStorageService.isEnabled() == false).
      endpoint: ${S3_ENDPOINT}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET}
      access-key-id: ${S3_ACCESS_KEY_ID}
      secret-access-key: ${S3_SECRET_ACCESS_KEY:}
      presigned-url-ttl-minutes: ${S3_PRESIGNED_URL_TTL_MINUTES:60}

  openfoodfacts:
    base-url: ${OFF_BASE_URL:https://world.openfoodfacts.org}
    user-agent: ${OFF_USER_AGENT:GlucoseMonitor/1.0 (open-source, contact via GitHub)}

  logmeal:
    enabled: ${LOGMEAL_ENABLED:true}
    api-key: ${LOGMEAL_API_KEY:}
    base-url: ${LOGMEAL_BASE_URL:https://api.logmeal.com/v2}
  ai:
    ollama:
      enabled: ${OLLAMA_ENABLED:true}
      # Ollama Cloud default; for local Ollama use http://localhost:11434/api/generate
      url: ${OLLAMA_URL:http://localhost:11434/api/generate}
      model: ${OLLAMA_MODEL:llama3.2:latest}
      vision-model: ${OLLAMA_VISION_MODEL:llava:latest}
      api-key: ${OLLAMA_API_KEY:}
      num-ctx: ${OLLAMA_NUM_CTX:8192}
    qwen:
      enabled: ${QWEN_ENABLED:true}
      url: ${QWEN_URL:https://api.openai.com/v1}
      model: ${QWEN_MODEL:qwen-plus}
      vision-model: ${QWEN_VISION_MODEL:gpt-4o-mini}
      api-key: ${QWEN_API_KEY:}
    yolo:
      url: ${YOLO_SERVICE_URL:http://localhost:8001}
      confidence-threshold: ${YOLO_CONFIDENCE_THRESHOLD:0.35}
  version:
    version: "1.0.0"
    api-version: "v1"
    build-number: ${BUILD_NUMBER:dev-build}
    git-commit: ${GIT_COMMIT:unknown}
    build-time: ${BUILD_TIME:}
    min-frontend-version: "1.0.0"
    compatible-frontend-versions:
      - "1.0.0"
      - "1.0.1"
      - "1.1.0"
    min-ios-version: "1.0.0"
    compatible-ios-versions:
      - "1.0.0"
      - "1.0.1"
      - "1.1.0"
      - "1.0"
    feature-versions:
      glucose-calculations: "1.0.0"
      insulin-calculator: "1.0.0"
      carbs-on-board: "1.0.0"
  # Glucose observer — anomaly detection & alert scheduling
  observer:
    # How often the anomaly detector scans all users (matches CGM sync cadence).
    # Override via env var OBSERVER_INTERVAL_MS. Set to a large value in tests.
    interval-ms: ${OBSERVER_INTERVAL_MS:300000}   # 5 minutes default
  features:
    # Enable backend calculations with timezone support
    backend-mode-enabled: true
    insulin-calculator-enabled: true
    carbs-on-board-enabled: true
    glucose-data-enabled: false
    glucose-calculations-enabled: true
    user-configuration-enabled: false
    nutrition-aware-prediction-enabled: ${APP_FEATURES_NUTRITION_AWARE_PREDICTION_ENABLED:true}
    # Hovorka 2-compartment ODE model — off by default, enable per-env for validation
    hovorka-model-enabled: ${APP_FEATURES_HOVORKA_MODEL_ENABLED:true}
    food-photo-analysis-enabled: false
    ar-spatial-enabled: false
    cgm-service-external: false
    async-meal-pipeline: false

    # Migration percentages (0-100) - 100 means all users use backend
    insulin-calculator-migration-percent: 100
    carbs-on-board-migration-percent: 100
    glucose-data-migration-percent: 100
    glucose-calculations-migration-percent: 100

  # Background Nightscout в†’ DB sync (stored chart data), every 5 minutes per user with active config
  glucose-sync:
    enabled: true
    fixed-delay-ms: 300000
    initial-delay-ms: 15000
    entry-count: 100

management:
  endpoints:
    web:
      exposure:
        # Keep the default profile aligned with prod: only health/info exposed.
        # metrics/caches/loggers must be opted into per-environment AND are authenticated (see SecurityConfig).
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Libre Link Up: EU host default (France / EU LibreView accounts). Override with LIBRE_API_BASE_URL.
libre:
  api:
    base-url: ${LIBRE_API_BASE_URL:https://api-eu.libreview.io}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# CORS configuration for development
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}

kind: Application



