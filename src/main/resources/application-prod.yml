spring:
  datasource:
    # Set via env (Neon JDBC, Render, etc.). Do not commit secrets. Example: jdbc:postgresql://host/db?sslmode=require&user=...&password=...
    url: ${DATABASE_URL}
    # Do not inherit local defaults (application.yml): credentials usually live in DATABASE_URL.
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for migrations, validate schema
    show-sql: false  # Disable SQL logging in production
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: 3600000      # 1 hour
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:31536000000}    # default 365 days (override via env)

server:
  port: ${PORT:8080}  # Render sets PORT environment variable
  error:
    include-stacktrace: never

logging:
  level:
    root: INFO
    che.glucosemonitorbe: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# CORS: allow deployed FE at https://libre-glucose-monitor.onrender.com ; override with CORS_ALLOWED_ORIGINS for extra origins
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://libre-glucose-monitor.onrender.com,http://localhost:3000}

app:
  nightscout:
    url: ${NIGHTSCOUT_URL:}
    api-secret: ${NIGHTSCOUT_API_SECRET:}
    api-token: ${NIGHTSCOUT_API_TOKEN:}
