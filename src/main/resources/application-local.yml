# Local development profile.
# Run: SPRING_PROFILES_ACTIVE=local ./gradlew bootRun
#  or: -Dspring.profiles.active=local (IntelliJ VM options)
#
# Merges with application.yml; override env vars (DATABASE_URL, JWT_SECRET, etc.) as needed.

spring:
  application:
    name: glucose-monitor-be
  datasource:
    url: jdbc:postgresql://localhost:5432/glucose_monitor
    username: glucose_monitor_user
    password: glucose
    driver-class-name: org.postgresql.Driver
    hikari:

      maximum-pool-size: 10
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  error:
    include-stacktrace: always

logging:
  level:
    root: INFO
    che.glucosemonitorbe: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers

app:
  ai:
    ollama:
      # Local Ollama; override with OLLAMA_URL for cloud
      url: ${OLLAMA_URL:http://localhost:11434/api/generate}
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongo_data:

