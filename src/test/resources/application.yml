spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
security:
  jwt:
    secret: "very-strong-secret-change-me-please-make-it-long-and-secure-in-production-1234567890-abcdefghijklmnopqrstuvwxyz"
    access-expiration-ms: 3600000      # 1 hour
    refresh-expiration-ms: 86400000    # short for tests
cors:
  allowed-origins: http://localhost:3000