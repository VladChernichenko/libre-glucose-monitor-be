services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: glucose-monitor-postgres
    environment:
      POSTGRES_DB: glucose_monitor
      POSTGRES_USER: glucose_monitor_user
      POSTGRES_PASSWORD: glucose
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup_database.sql:/docker-entrypoint-initdb.d/setup_database.sql
      - ./fix_users_table.sql:/docker-entrypoint-initdb.d/fix_users_table.sql
    networks:
      - glucose-monitor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glucose_monitor_user -d glucose_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: products
    volumes:
      - mongo_data:/data/db

  # Local LLM (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: glucose-monitor-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - glucose-monitor-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Pull required local models into Ollama volume
  ollama-model-pull-llama31:
    image: ollama/ollama:latest
    container_name: glucose-monitor-ollama-model-pull-llama31
    depends_on:
      ollama:
        condition: service_healthy
    command: ["pull", "${OLLAMA_MODEL:-glm-5:cloud}"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - glucose-monitor-network
    restart: "no"

volumes:
  postgres_data:
  ollama_data:
  mongo_data:

networks:
  glucose-monitor-network:
    driver: bridge
